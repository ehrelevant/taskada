services:
  db:
    image: postgis/postgis:18-3.6-alpine
    restart: always
    env_file:
      - ./.env.production
    volumes:
      - postgres:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD', 'pg_isready']
      interval: 5s
      timeout: 5s
      retries: 5

  migrate:
    build:
      context: .
      dockerfile: docker/Dockerfile.server
      target: build
    command: pnpm --filter @repo/database migrate
    env_file:
      - packages/database/.env.production
    depends_on:
      db:
        condition: service_healthy

  seed:
    build:
      context: .
      dockerfile: docker/Dockerfile.server
      target: build
    command: pnpm --filter @repo/database seed
    env_file:
      - packages/database/.env.production
    depends_on:
      migrate:
        condition: service_completed_successfully

  server:
    build:
      context: .
      dockerfile: docker/Dockerfile.server
    ports:
      - '3000:3000'
    env_file:
      - apps/server/.env.production
    depends_on:
      seed:
        condition: service_completed_successfully

  moderation:
    build:
      context: .
      dockerfile: docker/Dockerfile.moderation
    ports:
      - '3300:3300'
    env_file:
      - apps/moderation/.env.production
    depends_on:
      - server

volumes:
  postgres:
