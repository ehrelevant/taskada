services:
  database:
    image: postgis/postgis:18-3.6-alpine
    restart: always
    init: true
    env_file:
      - ./.env.production
    volumes:
      - postgres:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD', 'pg_isready']
      interval: 5s
      timeout: 5s
      retries: 5

  migrate:
    profiles:
      - ops
    build:
      context: .
      dockerfile: Dockerfile.production
      target: database-tools
    command: pnpm migrate
    restart: 'no'
    env_file:
      - packages/database/.env.production
    depends_on:
      database:
        condition: service_healthy

  seed:
    profiles:
      - ops
    build:
      context: .
      dockerfile: Dockerfile.production
      target: database-tools
    command: pnpm seed
    restart: 'no'
    env_file:
      - packages/database/.env.production
    depends_on:
      database:
        condition: service_healthy

  server:
    build:
      context: .
      dockerfile: Dockerfile.production
      target: server-app
    ports:
      - '3000:3000'
    restart: unless-stopped
    init: true
    env_file:
      - apps/server/.env.production
      - packages/xendit-payment-engine/.env.production
    depends_on:
      database:
        condition: service_healthy

  moderation:
    build:
      context: .
      dockerfile: Dockerfile.production
      target: moderation-app
    ports:
      - '3300:3300'
    restart: unless-stopped
    init: true
    env_file:
      - apps/moderation/.env.production
    depends_on:
      server:
        condition: service_started

volumes:
  postgres:
