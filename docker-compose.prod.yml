services:
  database:
    image: postgis/postgis:18-3.6-alpine
    restart: always
    env_file:
      - ./.env.production
    volumes:
      - postgres:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD', 'pg_isready']
      interval: 5s
      timeout: 5s
      retries: 5

  migrate:
    build:
      context: .
      dockerfile: docker/Dockerfile.database
    command: pnpm --filter @repo/database migrate
    env_file:
      - packages/database/.env.production
    depends_on:
      database:
        condition: service_healthy

  seed:
    build:
      context: .
      dockerfile: docker/Dockerfile.database
    command: pnpm --filter @repo/database seed
    env_file:
      - packages/database/.env.production
    depends_on:
      database:
        condition: service_healthy

  server:
    build:
      context: .
      dockerfile: docker/Dockerfile.server
    ports:
      - '3000:3000'
    env_file:
      - apps/server/.env.production
      - packages/xendit-payment-engine/.env.production
    depends_on:
      database:
        condition: service_healthy

  moderation:
    build:
      context: .
      dockerfile: docker/Dockerfile.moderation
    ports:
      - '3300:3300'
    env_file:
      - apps/moderation/.env.production
    depends_on:
      - server

volumes:
  postgres:
